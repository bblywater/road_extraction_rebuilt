dataset:
  name: massachusetts
  root: data/massachusetts
  patch_root: data/massachusetts_patches
  patch_size: 512
  target_size: 1536
  corrupted_files: []
  use_prepatched_train: true
  use_prepatched_val: true
  use_prepatched_test: false

model:
  name: dilated_baseline_unet
  in_channels: 3
  out_channels: 1
  init_channels: 32
  apply_sigmoid: false

loss:
  name: dice_bce
  from_logits: true
  bce_weight: 1.0
  dice_weight: 1.0
  pos_weight: 1.0

training:
  epochs: 20
  batch_size: 4
  learning_rate: 0.0001
  weight_decay: 0.00001
  amp: true
  gradient_clip: 1.0
  num_workers: 4
  num_workers_val: 0
  pin_memory: true
  pin_memory_val: false
  persistent_workers: true
  prefetch_factor: 4
  log_interval: 100
  scheduler:
    name: steplr
    step_size: 10
    gamma: 0.5
  early_stopping:
    patience: 8
    min_delta: 0.001

output:
  experiment_name: dilated_baseline_unet_massachusetts_full
  root: experiments
  save_every: 5
  metric: iou
